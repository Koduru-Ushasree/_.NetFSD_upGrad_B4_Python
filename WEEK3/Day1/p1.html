<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Feedback Form</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }
        .container {
            width: 100%;
            max-width: 400px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            box-sizing: border-box;
        }
        button {
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        .error {
            margin-top: 10px;
            color: red;
            font-size: 14px;
        }
        .success {
            color: green;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Student Feedback Form</h2>

    <form id="feedbackForm">
        <label>Name:</label>
        <input type="text" id="name">

        <label>Email:</label>
        <input type="email" id="email">

        <label>Course Rating:</label>
        <select id="rating">
            <option value="">Select Rating</option>
            <option>Excellent</option>
            <option>Good</option>
            <option>Average</option>
            <option>Poor</option>
        </select>

        <label>Comments:</label>
        <textarea id="comments"></textarea>

        <button type="submit">Submit</button>
    </form>
    <div id="message"></div>
</div>

<script>
$(document).ready(function(){

    $("#feedbackForm").submit(function(event){

        event.preventDefault(); // Prevent page reload

        let name = $("#name").val().trim();
        let email = $("#email").val().trim();

        if(name === "" && email === "") {
            $("#message").html("<div class='error'>Please Enter Both Name and Email.</div>");
        } 
        else if(name === "") {
            $("#message").html("<div class='error'>Please enter your Name.</div>");
        }
        else if(email === "") {
            $("#message").html("<div class='error'>Please enter your Email.</div>");
        }
        
        
        else {
            $("#message").html("<div class='success'>Thank you "+ name + " for your feedback! </div>");

            // Clear form fields
           $("#name").val("");
           $("#email").val("");
           $("#rating").val("");
           $("#comments").val("");
        }

    });

});
</script>
</body>
</html>

<!-- Problem 1 (Level-1): Student Feedback Form Interaction
Scenario:
A training institute wants to collect feedback from students through a simple web form. They want to enhance user experience using jQuery to validate inputs and display messages dynamically without reloading the page.
Requirements
• Create a feedback form with fields: Name, Email, Course Rating (dropdown), and Comments.
• Use jQuery selectors to capture form inputs.
• On clicking the Submit button, validate that Name and Email are not empty.
• Display a success message dynamically below the form using jQuery DOM manipulation.
• Clear the form fields after successful submission.
 
️Technical Constraints
• Use jQuery CDN for integration.
• Use basic jQuery syntax: $(selector).action().
• Do not use plain JavaScript for validation (only jQuery methods).
• No backend integration required. -->
