<!DOCTYPE html>
<html>
<head>
    <title>Counter App</title>
</head>
<body>

<h2>Counter App</h2>

<p id="counterDisplay">0</p>

<button id="incrementBtn">Increment</button>
<button id="resetBtn">Reset</button>

<script>

    // Global variable (outside functions)
    var counter = 0;

    // Function to increment counter
    function incrementCounter(step) {

        // Update global variable
        counter = counter + step;

        // Update UI
        document.getElementById("counterDisplay").innerHTML = counter;
    }

    // Function to reset counter
    function resetCounter() {

        counter = 0;

        document.getElementById("counterDisplay").innerHTML = counter;
    }

    // Attach event listeners (NO inline JS)
    document.getElementById("incrementBtn").addEventListener("click", function() {
        incrementCounter(1);   // Step value passed
    });

    document.getElementById("resetBtn").addEventListener("click", resetCounter);

</script>

</body>
</html>
