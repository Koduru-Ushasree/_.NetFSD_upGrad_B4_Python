<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Student Grade Evaluator</h1>
    <script>
        let input = prompt("Enter student marks:");
        let marks = Number(input);
        if (isNaN(marks)) {
            document.write("Invalid input");
        } else if (marks >= 75) {
            document.write("Grade A");
        } else if (marks >= 60) { 
            document.write("Grade B");
        } else if (marks >= 40) {
            document.write("Grade C");
        } else {
            document.write("Fail");
        }


    </script>
</body>
</html>
