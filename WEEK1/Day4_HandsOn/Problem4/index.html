<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document4</title>
</head>
<body>
    <h1>Traffic Signal Simulator</h1>
    <script>
        let signal = prompt("Enter a color");
        switch(signal) {
            case "red":
                document.write("Stop");
                break;
            case "yellow":
                document.write("Get Ready");
                break;
            case "green":
                document.write("Go");
                break;
            default:
                document.write("Invalid signal color");
        }

    </script>
</body>
</html>
