<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Analysis Tool</title>
</head>
<body>
 <h1>Number Analysis Tool</h1>
<script>

// Store number in a variable
let num = prompt("Enter a number");

// Check Positive or Negative using ternary operator
let result = (num >= 0) ? "Positive" : "Negative";
console.log("Number is:", result);

//  Check Even or Odd using if–else
if (num % 2 === 0) {
    console.log("Number is Even");
} else {
    console.log("Number is Odd");
}

// Use loop to print numbers from 1 to given number
console.log("Numbers from 1 to", num, ":");

for (let i = 1; i <= num; i++) {
    console.log(i);
}

</script>

</body>
</html>
