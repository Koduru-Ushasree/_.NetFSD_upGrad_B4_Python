<!DOCTYPE html>
<html>
<head>
<title>Profile Card</title>
<style>

body {
    font-family: Arial;
    background-color: #f4f4f4;
}
.card {
    width: 300px;
    margin: 50px auto;
    padding: 20px;
    border: 2px solid #333;
    border-radius: 10px;
    background-color: white;
    text-align: center;
}
.card h2 {
    font-size: 24px;
    font-weight: bold;
}
.card p {
    line-height: 1.6;
    letter-spacing: 1px;
}
button {
    padding: 10px 20px;
    border: none;
    background-color: blue;
    color: white;
    cursor: pointer;
}
button:hover {
    background-color: darkblue;
}
</style>
</head>
<body>

<div class="card">
    <h2>Usha</h2>
    <h4>Frontend Developer</h4>
    <p>Passionate about building responsive web applications.</p>
    <button>Contact</button>
</div>

</body>
</html>
