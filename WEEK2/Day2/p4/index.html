<!DOCTYPE html>
<html>
<head>
    <title>Async Task Manager</title>
</head>
<body>

    <h2>Task Manager (Async Evolution)</h2>

    <input type="text" id="taskInput" placeholder="Enter task">
    
    <br><br>

    <button id="addBtn">Add Task (Async/Await)</button>
    <button id="deleteBtn">Delete Task (Async/Await)</button>
    <button id="listBtn">List Tasks</button>

    <h3>Output:</h3>
    <div id="output"></div>

    <!-- Import JS as Module -->
    <script type="module" src="main.js"></script>

</body>
</html>
