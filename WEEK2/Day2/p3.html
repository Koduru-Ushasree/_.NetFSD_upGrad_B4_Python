<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weather Data Fetcher</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #74ebd5, #9face6);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        text-align: center;
        width: 300px;
    }

    input {
        padding: 8px;
        width: 90%;
        margin-bottom: 10px;
    }

    button {
        padding: 8px 15px;
        background: #4CAF50;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 5px;
    }

    button:hover {
        background: #45a049;
    }

    #output {
        margin-top: 15px;
    }
</style>

</head>
<body>
<div class="container">
    <h2>Weather App</h2>

    <input type="text" id="cityInput" placeholder="Enter City (e.g. Bangalore)">
    <button onclick="fetchWeather()">Fetch Weather</button>

    <div id="output"></div>
</div>
<script>
const outputDiv = document.getElementById("output");
// Convert city name to coordinates using Open-Meteo Geocoding API
const fetchWeather = async () => {
     const city = document.getElementById("cityInput").value;
    if (!city) {
        displayError("Please enter a city name");
        return;
    }
    try {

        //  Get coordinates
        const geoResponse = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1`);
        if (!geoResponse.ok) {
            throw new Error("City not found");
        }
        const geoData = await geoResponse.json();
        if (!geoData.results) {
            throw new Error("City not found");
        }
        const { latitude, longitude, name, country } = geoData.results[0];
       //Fetch weather using coordinates
        const weatherResponse = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);

        if (!weatherResponse.ok) {
            throw new Error("Failed to fetch weather");
        }

        const weatherData = await weatherResponse.json();

        displayWeather(weatherData.current_weather, name, country);

    } catch (error) {
        displayError(error.message);
    }
};
// Display weather
const displayWeather = (weather, city, country) => {
    outputDiv.innerHTML = `
        <h3>${city}, ${country}</h3>
        <p><strong>Temperature:</strong> ${weather.temperature}°C</p>
        <p><strong>Wind Speed:</strong> ${weather.windspeed} km/h</p>
        <p><strong>Wind Direction:</strong> ${weather.winddirection}°</p>
        <p><strong>Time:</strong> ${weather.time}</p>
    `;
};


// Display error
const displayError = (message) => {
    outputDiv.innerHTML = `
        <p style="color:red;">
            <strong>Error:</strong> ${message}
        </p>
    `;
};

</script>

</body>
</html>
