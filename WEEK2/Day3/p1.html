<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Feedback</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    background-color: #f2f2f2;
}

.card {
    background-color: #aaa2b8;  
    padding: 40px;
    width: 350px;
    text-align: center;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

textarea {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: none;
    resize: none;
}

button {
    background-color: #4CAF50;
    color: white;
    border-radius: 5px;
    border: none;
    padding: 12px;
    margin-top: 10px;
    cursor: pointer;
}

button:hover {
    background-color: #568c59;
}

#output {
    margin-top: 15px;
    font-size: 16px;
    font-weight: bold;
    display: none;
}
</style>
</head>

<body>

<div class="card">
    <h2>Student Feedback Form</h2>

    <textarea id="feedbackInput" rows="3"placeholder="Enter your feedback here..."></textarea>

    <button id="feedbackBtn">Submit Feedback</button>

    <div id="output"></div>
</div>

<script>
const btn = document.getElementById("feedbackBtn");
const msgDiv = document.getElementById("output");
const feedbackInput = document.getElementById("feedbackInput");

btn.addEventListener("click", function() {

    const feedbackText = feedbackInput.value.trim();

    if (feedbackText === "") {
        msgDiv.textContent = "Please enter your feedback!";
        msgDiv.style.color = "red";
    } else {

        msgDiv.textContent = "Thank You! Feedback submitted successfully.";
        msgDiv.style.color = "green";

        feedbackInput.value = "";
    }

    msgDiv.style.display = "block";
});
</script>

</body>
</html>
