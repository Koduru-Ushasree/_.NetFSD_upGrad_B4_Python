<!-- Problem 3: Location-Based Weather Logger (Level-2)
Scenario
Create a web application that fetches the user's geographic location and stores location history in localStorage.

📌 Requirements
•	Button: Get My Location 
•	Use:
navigator.geolocation.getCurrentPosition()
•	Display:
Latitude
Longitude
•	Handle:
Permission denied
Timeout
Location unavailable
•	Save last 5 location entries in localStorage.
•	Display location history on page load.

🛠️ Technical Constraints
•	Must handle:
Success callback
Error callback
•	Use browser permission handling.
•	Store data as JSON using:
JSON.stringify()
JSON.parse()
•	Use inline event (onclick).
🎯 Learning Outcome
Learners should be able to:
•	Geolocation API
•	Handling browser permissions
•	Error handling in APIs
•	Managing structured data in localStorage
•	JSON parsing and stringifying -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <title>Location Logger</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 40px;
        }

        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        .error {
            color: red;
        }

        .history {
            margin-top: 20px;
        }
    </style>
</body>
 <h2>Location-Based Weather Logger</h2>

    <!-- Button with inline onclick -->
    <button onclick="getLocation()">Get My Location</button>

    <p id="output"></p>

    <div class="history">
        <h3>Last 5 Locations</h3>
        <ul id="historyList"></ul>
    </div>

<script>

    // This function runs when button is clicked
    function getLocation() {

        // Check if browser supports Geolocation
        if (navigator.geolocation) {

            // Request current position
            navigator.geolocation.getCurrentPosition(
                showPosition,   // Success callback
                showError,      // Error callback
                { timeout: 10000 } // 10 seconds timeout
            );

        } else {
            document.getElementById("output").innerHTML =
                "Geolocation is not supported by this browser.";
        }
    }

    // Success callback function
    function showPosition(position) {

        var latitude = position.coords.latitude;
        var longitude = position.coords.longitude;

        // Display latitude and longitude
        document.getElementById("output").innerHTML =
            "Latitude: " + latitude + "<br>Longitude: " + longitude;

        // Create location object with timestamp
        var locationData = {
            lat: latitude,
            long: longitude,
            time: new Date().toLocaleString()
        };

        // Get existing data from localStorage
        var history = localStorage.getItem("locations");

        // Convert string back to array
        history = history ? JSON.parse(history) : [];

        // Add new location at beginning
        history.unshift(locationData);

        // Keep only last 5 entries
        if (history.length > 5) {
            history.pop();
        }

        // Convert array to JSON string and store
        localStorage.setItem("locations", JSON.stringify(history));

        // Refresh displayed history
        displayHistory();
    }

    // Error callback function
    function showError(error) {

        var message = "";

        switch(error.code) {

            case error.PERMISSION_DENIED:
                message = "User denied the request for Geolocation.";
                break;

            case error.POSITION_UNAVAILABLE:
                message = "Location information is unavailable.";
                break;

            case error.TIMEOUT:
                message = "The request to get user location timed out.";
                break;

            default:
                message = "An unknown error occurred.";
        }

        document.getElementById("output").innerHTML = message;
        document.getElementById("output").className = "error";
    }

    // Display history on page load
    function displayHistory() {

        var history = localStorage.getItem("locations");
        history = history ? JSON.parse(history) : [];

        var list = document.getElementById("historyList");
        list.innerHTML = "";

        history.forEach(function(loc) {

            var li = document.createElement("li");
            li.innerHTML =
                "Lat: " + loc.lat +
                ", Long: " + loc.long +
                " (" + loc.time + ")";

            list.appendChild(li);
        });
    }

    // Automatically show stored history when page loads
    window.onload = displayHistory;

</script>
</html>
